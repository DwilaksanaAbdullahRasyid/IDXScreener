<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}IDX Smart Screener{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f080c;
      --surface: #1a0f16;
      --surface2: #25161f;
      --border: rgba(255, 99, 219, 0.18);
      --accent: #ff63db;
      --accent2: #ff9cf0;
      --green: #00e676;
      --red: #ff4d6d;
      --yellow: #ffd700;
      --text: #fceef5;
      --muted: #a68498;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Nav */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 56px;
    }
    nav .brand {
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
      letter-spacing: 0.5px;
    }
    nav .brand span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    nav a {
      color: var(--muted);
      font-size: 13px;
      transition: color .15s;
    }
    nav a:hover, nav a.active { color: var(--text); text-decoration: none; }

    /* Layout */
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 16px;
    }

    /* Grid */
    .grid { display: grid; gap: 16px; }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }

    /* Stat */
    .stat { text-align: center; }
    .stat .value { font-size: 28px; font-weight: 700; }
    .stat .label { color: var(--muted); font-size: 12px; margin-top: 2px; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255, 99, 219, 0.04); }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .badge-green { background: rgba(63,185,80,0.15); color: var(--green); }
    .badge-red   { background: rgba(248,81,73,0.15);  color: var(--red); }
    .badge-blue  { background: rgba(255, 99, 219, 0.15); color: var(--accent); }
    .badge-yellow{ background: rgba(210,153,34,0.15); color: var(--yellow); }

    /* Flow number */
    .positive { color: var(--green); font-weight: 600; }
    .negative { color: var(--red);   font-weight: 600; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }
    .empty .icon { font-size: 32px; margin-bottom: 8px; }

    /* Form elements */
    select, input[type=text] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 8px 12px;
      font-size: 13px;
    }
    select:focus, input[type=text]:focus {
      outline: none;
      border-color: var(--accent);
    }
    .btn {
      background: linear-gradient(135deg, var(--accent), #ff66e5);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { opacity: 0.85; }

    .filter-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .page-header {
      margin-bottom: 24px;
    }
    .page-header h1 {
      font-size: 22px;
      font-weight: 700;
    }
    .page-header p {
      color: var(--muted);
      margin-top: 4px;
    }

    @media (max-width: 768px) {
      .grid-3 { grid-template-columns: 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<nav>
  <a href="/" class="brand">STI<span>X</span></a>
  <a href="/dashboard/" {% if '/dashboard/' in request.path %}class="active"{% endif %}>Dashboard</a>
  <a href="/screener/"  {% if '/screener/'  in request.path %}class="active"{% endif %}>Screener</a>
  <a href="/backtest/"  {% if '/backtest/'  in request.path %}class="active"{% endif %}>Backtest</a>
  <a href="/trade-log/" {% if '/trade-log/' in request.path %}class="active"{% endif %}>Trade Log</a>
</nav>

<div class="container">
  {% block content %}{% endblock %}
</div>

</body>
</html>
